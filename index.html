<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akosmark</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .container {
            width: 720vw;
            height: 1280vh;
            overflow: hidden;
        }

        .zoom-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoomIn 20s linear infinite alternate;
            transform-origin: center center;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.4);
            }
            to {
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="akosmark-like.png" alt="Kép" class="zoom-image">
    </div>

</body>
</html>
